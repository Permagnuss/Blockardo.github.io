<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockardo</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { background: #2a2a2a; border: 2px solid #444; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .ui-panel { text-align: center; background: #333; padding: 15px; border-radius: 8px; border: 1px solid #555; margin-top: 10px; width: 620px;}
        kbd { background: #555; padding: 2px 5px; border-radius: 4px; font-size: 0.8em; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px; font-size: 0.9em; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px;}
        
        /* Customization UI */
        .theme-editor { display: flex; justify-content: space-around; font-size: 0.8em; }
        .theme-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        input[type="color"] { border: none; width: 30px; height: 30px; cursor: pointer; background: none; }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div class="ui-panel">
        <h3 style="margin:0">Floor: <span id="floorDisplay">1</span></h3>
        <div class="controls">
            <div><strong>Move:</strong> <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd></div>
            <div><strong>Rotate Camera:</strong> <kbd>←</kbd> <kbd>→</kbd></div>
        </div>

        <div class="theme-editor">
            <div class="theme-item">
                <label>Player</label>
                <input type="color" id="colorPlayer" value="#ff4444">
            </div>
            <div class="theme-item">
                <label>Walls</label>
                <input type="color" id="colorWall" value="#777777">
            </div>
            <div class="theme-item">
                <label>Floor</label>
                <input type="color" id="colorFloor" value="#444444">
            </div>
            <div class="theme-item">
                <label>Stairs</label>
                <input type="color" id="colorStairs" value="#0099ff">
            </div>
            <div class="theme-item">
                <label>BG</label>
                <input type="color" id="colorBG" value="#2a2a2a">
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const floorDisplay = document.getElementById('floorDisplay');

    // --- CONFIG & THEME ---
    const TILE_W = 50;  
    const TILE_H = 25;  
    const WALL_H = 35;  
    const MAP_SIZE = 12;
    
    // Theme colors with helper to darken them for sides
    const theme = {
        player: '#ff4444',
        wall: '#777777',
        floor: '#444444',
        stairs: '#0099ff',
        bg: '#2a2a2a'
    };

    // Helper to auto-generate side colors
    function shadeColor(col, amt) {
        let usePound = false;
        if (col[0] == "#") { col = col.slice(1); usePound = true; }
        let num = parseInt(col, 16);
        let r = (num >> 16) + amt;
        if (r > 255) r = 255; else if (r < 0) r = 0;
        let b = ((num >> 8) & 0x00FF) + amt;
        if (b > 255) b = 255; else if (b < 0) b = 0;
        let g = (num & 0x0000FF) + amt;
        if (g > 255) g = 255; else if (g < 0) g = 0;
        return (usePound ? "#" : "") + (g | (b << 8) | (r << 16)).toString(16).padStart(6, '0');
    }

    let floorLevel = 1;
    let map = [];
    let targetAngle = 0; 
    let currentAngle = 0; 

    const player = {
        tx: 0, ty: 0,
        x: 0, y: 0,  
        speed: 0.2
    };

    // Link UI to Theme
    document.querySelectorAll('.theme-item input').forEach(input => {
        input.addEventListener('input', (e) => {
            const id = e.target.id.replace('color', '').toLowerCase();
            theme[id] = e.target.value;
            if(id === 'bg') canvas.style.background = theme.bg;
        });
    });

    function generateMap() {
        let newMap = Array(MAP_SIZE).fill(0).map(() => Array(MAP_SIZE).fill(1));
        let cx = Math.floor(MAP_SIZE / 2), cy = Math.floor(MAP_SIZE / 2);
        player.tx = cx; player.ty = cy; player.x = cx; player.y = cy;
        newMap[cy][cx] = 0;
        
        for(let i = 0; i < 150; i++) {
            let dir = Math.floor(Math.random() * 4);
            if(dir === 0 && cx > 1) cx--; if(dir === 1 && cx < MAP_SIZE - 2) cx++;
            if(dir === 2 && cy > 1) cy--; if(dir === 3 && cy < MAP_SIZE - 2) cy++;
            newMap[cy][cx] = 0;
        }
        newMap[cy][cx] = 3; 
        return newMap;
    }

    function toIso(gridX, gridY) {
        const centerX = MAP_SIZE / 2;
        const centerY = MAP_SIZE / 2;
        const relX = gridX - centerX;
        const relY = gridY - centerY;
        const rotX = relX * Math.cos(currentAngle) - relY * Math.sin(currentAngle);
        const rotY = relX * Math.sin(currentAngle) + relY * Math.cos(currentAngle);
        const isoX = (rotX - rotY) * (TILE_W / 2);
        const isoY = (rotX + rotY) * (TILE_H / 2);
        return { x: canvas.width / 2 + isoX, y: canvas.height / 2 + isoY };
    }

    function drawBlock(x, y, z, baseColor) {
        const iso = toIso(x, y);
        const drawX = iso.x, drawY = iso.y - z;
        
        // Generate shades for 3D effect
        const colorTop = baseColor;
        const colorLeft = shadeColor(baseColor, -20);
        const colorRight = shadeColor(baseColor, -40);

        ctx.beginPath();
        ctx.moveTo(drawX, drawY);
        ctx.lineTo(drawX + TILE_W / 2, drawY + TILE_H / 2);
        ctx.lineTo(drawX, drawY + TILE_H);
        ctx.lineTo(drawX - TILE_W / 2, drawY + TILE_H / 2);
        ctx.closePath();
        ctx.fillStyle = colorTop; ctx.fill();
        ctx.strokeStyle = "rgba(0,0,0,0.1)"; ctx.stroke();

        if (z > 0) {
            ctx.beginPath();
            ctx.moveTo(drawX - TILE_W / 2, drawY + TILE_H / 2);
            ctx.lineTo(drawX, drawY + TILE_H);
            ctx.lineTo(drawX, drawY + TILE_H + z);
            ctx.lineTo(drawX - TILE_W / 2, drawY + TILE_H / 2 + z);
            ctx.closePath();
            ctx.fillStyle = colorLeft; ctx.fill(); ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(drawX, drawY + TILE_H);
            ctx.lineTo(drawX + TILE_W / 2, drawY + TILE_H / 2);
            ctx.lineTo(drawX + TILE_W / 2, drawY + TILE_H / 2 + z);
            ctx.lineTo(drawX, drawY + TILE_H + z);
            ctx.closePath();
            ctx.fillStyle = colorRight; ctx.fill(); ctx.stroke();
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        let sortList = [];
        for (let y = 0; y < MAP_SIZE; y++) {
            for (let x = 0; x < MAP_SIZE; x++) {
                const relX = x - MAP_SIZE/2;
                const relY = y - MAP_SIZE/2;
                const depth = relX * Math.sin(currentAngle + Math.PI/4) + relY * Math.cos(currentAngle + Math.PI/4);
                sortList.push({x, y, depth});
            }
        }
        sortList.sort((a, b) => a.depth - b.depth);

        sortList.forEach(tilePos => {
            const {x, y} = tilePos;
            const tile = map[y][x];
            
            // Draw floor
            drawBlock(x, y, 0, theme.floor);

            if (tile === 1) drawBlock(x, y, WALL_H, theme.wall);
            if (tile === 3) drawBlock(x, y, 10, theme.stairs);

            if (Math.round(player.x) === x && Math.round(player.y) === y) {
                drawBlock(player.x, player.y, 20, theme.player);
            }
        });
    }

    function gameLoop() {
        player.x += (player.tx - player.x) * player.speed;
        player.y += (player.ty - player.y) * player.speed;
        currentAngle += (targetAngle - currentAngle) * 0.1;
        render();
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') targetAngle -= Math.PI / 2;
        if (e.key === 'ArrowRight') targetAngle += Math.PI / 2;

        let dx = 0, dy = 0;
        if (['w','a','s','d'].includes(e.key.toLowerCase())) {
            const angleDeg = ((targetAngle * 180 / Math.PI) % 360 + 360) % 360;
            const key = e.key.toLowerCase();
            if (key === 'w') {
                if (angleDeg === 0) dy = -1; else if (angleDeg === 90) dx = 1; else if (angleDeg === 180) dy = 1; else dx = -1;
            } else if (key === 's') {
                if (angleDeg === 0) dy = 1; else if (angleDeg === 90) dx = -1; else if (angleDeg === 180) dy = -1; else dx = 1;
            } else if (key === 'a') {
                if (angleDeg === 0) dx = -1; else if (angleDeg === 90) dy = -1; else if (angleDeg === 180) dx = 1; else dy = 1;
            } else if (key === 'd') {
                if (angleDeg === 0) dx = 1; else if (angleDeg === 90) dy = 1; else if (angleDeg === 180) dx = -1; else dy = -1;
            }

            const nx = player.tx + dx, ny = player.ty + dy;
            if (nx >= 0 && nx < MAP_SIZE && ny >= 0 && ny < MAP_SIZE && map[ny][nx] !== 1) {
                player.tx = nx; player.ty = ny;
                if (map[ny][nx] === 3) {
                    floorLevel++; floorDisplay.innerText = floorLevel; map = generateMap();
                }
            }
        }
    });

    map = generateMap();
    gameLoop();
</script>
</body>
</html>
